syntax = "proto3";

package stream;

option go_package = "./";

message ProductCreateReq {
  string title = 1;
  float price=2;
  int64 inventoryId=3;
  int64 typeId=4;
  string img=5;
}
message ProductCreateResp {
  int64 code= 1;
  string msg=2;
}

service StreamGreeter {
  rpc ProductCreate(ProductCreateReq) returns (ProductCreateResp);
}